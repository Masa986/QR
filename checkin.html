<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出退室チェックイン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --card: #1c1c28;
    --accent: #00e5ff; --accent2: #7c3aed;
    --success: #00ff88; --danger: #ff3b5c;
    --text: #f0f0ff; --muted: #6b6b8a; --border: rgba(0,229,255,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,229,255,0.08) 0%, transparent 50%);
    animation: drift 20s ease-in-out infinite alternate; pointer-events: none; z-index: 0;
  }
  @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(3%,2%); } }
  .container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 24px 20px 40px; }
  .header { text-align: center; padding: 32px 0 28px; }
  .logo-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 18px; margin-bottom: 16px;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { box-shadow: 0 0 30px rgba(0,229,255,0.3); }
    50% { box-shadow: 0 0 50px rgba(0,229,255,0.5); }
  }
  .logo-mark svg { width: 32px; height: 32px; fill: white; }
  .header h1 {
    font-size: 22px; font-weight: 900; letter-spacing: 0.05em;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header p { color: var(--muted); font-size: 13px; margin-top: 6px; letter-spacing: 0.08em; }
  .steps { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 28px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
  .step-dot.active { width: 24px; border-radius: 4px; background: var(--accent); box-shadow: 0 0 10px rgba(0,229,255,0.5); }
  .step-dot.done { background: var(--accent2); }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 24px; margin-bottom: 16px; display: none;
    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .card.active { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; font-family: 'Space Mono', monospace; }
  .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  /* Loading / Error */
  .loading { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
  .spinner {
    width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; margin: 14px auto 0; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    background: rgba(255,59,92,0.1); border: 1px solid rgba(255,59,92,0.3);
    border-radius: 12px; padding: 16px; color: var(--danger); font-size: 13px; line-height: 1.7;
  }
  .error-msg code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  /* Grade */
  .grade-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
  .grade-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 12px; color: var(--text); font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    text-align: center; position: relative; overflow: hidden;
  }
  .grade-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--accent2), var(--accent)); opacity: 0; transition: opacity 0.2s;
  }
  .grade-btn.selected::before { opacity: 1; }
  .grade-btn span { position: relative; z-index: 1; }
  .grade-btn .grade-num { display: block; font-size: 28px; font-weight: 900; line-height: 1; margin-bottom: 4px; font-family: 'Space Mono', monospace; }
  .grade-btn .grade-label { font-size: 11px; color: var(--muted); transition: color 0.2s; }
  .grade-btn.selected .grade-label { color: rgba(255,255,255,0.8); }
  .grade-btn.selected { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,229,255,0.2); }

  /* Students */
  .student-list { display: flex; flex-direction: column; gap: 10px; }
  .student-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: all 0.2s;
  }
  .student-item.selected { border-color: var(--accent); background: rgba(0,229,255,0.05); box-shadow: 0 0 20px rgba(0,229,255,0.1); }
  .radio-circle {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--muted);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .student-item.selected .radio-circle { border-color: var(--accent); background: var(--accent); }
  .radio-circle::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--bg); opacity: 0; transition: opacity 0.2s; }
  .student-item.selected .radio-circle::after { opacity: 1; }
  .student-name { font-size: 16px; font-weight: 700; flex: 1; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em; font-family: 'Space Mono', monospace; }
  .status-badge.in { background: rgba(0,255,136,0.15); color: var(--success); border: 1px solid rgba(0,255,136,0.3); }
  .status-badge.out { background: rgba(107,107,138,0.15); color: var(--muted); border: 1px solid rgba(107,107,138,0.3); }

  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .btn { padding: 16px; border-radius: 14px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
  .btn:active { transform: scale(0.97); }
  .btn-enter { background: linear-gradient(135deg, #00c87a, var(--success)); color: #001a0d; }
  .btn-exit  { background: linear-gradient(135deg, #c7002d, var(--danger)); color: white; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-back {
    width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 14px; border-radius: 14px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 10px; transition: all 0.2s;
  }
  .current-status-info {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: var(--muted); display: none;
  }
  .current-status-info.show { display: block; }
  .current-status-info strong { color: var(--text); }

  /* Success */
  .success-screen { text-align: center; padding: 20px 0; }
  .success-icon {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center; font-size: 36px;
    animation: pop 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes pop { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
  .success-icon.enter { background: rgba(0,255,136,0.15); border: 2px solid var(--success); box-shadow: 0 0 40px rgba(0,255,136,0.3); }
  .success-icon.exit  { background: rgba(255,59,92,0.15);  border: 2px solid var(--danger);  box-shadow: 0 0 40px rgba(255,59,92,0.3); }
  .success-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .success-screen p  { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .time-display {
    font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent);
    background: rgba(0,229,255,0.08); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; display: inline-block; margin-bottom: 24px;
  }
  .btn-reset {
    width: 100%; background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; color: white; padding: 16px; border-radius: 14px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
  }

  /* ── 認証画面 ── */
  #auth-screen {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  #auth-screen::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 30%, rgba(124,58,237,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(0,229,255,0.1) 0%, transparent 50%);
    animation: drift 20s ease-in-out infinite alternate; pointer-events: none;
  }
  .auth-card {
    position: relative; z-index: 1;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 24px; padding: 36px 28px;
    width: 100%; max-width: 360px; margin: 20px;
    text-align: center;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  .auth-logo {
    width: 64px; height: 64px; margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 18px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  .auth-logo svg { width: 32px; height: 32px; fill: white; }
  .auth-card h2 {
    font-size: 20px; font-weight: 900; margin-bottom: 6px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .auth-card p { color: var(--muted); font-size: 13px; margin-bottom: 28px; letter-spacing: 0.06em; }

  .pin-display {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 24px;
  }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--muted); transition: all 0.2s;
  }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(0,229,255,0.6); }
  .pin-dot.error  { background: var(--danger);  border-color: var(--danger);  box-shadow: 0 0 8px rgba(255,59,92,0.6); animation: shake 0.4s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }

  .numpad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .num-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 0;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 20px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; user-select: none;
  }
  .num-btn:active { transform: scale(0.93); background: rgba(0,229,255,0.1); border-color: var(--accent); }
  .num-btn.del { font-size: 16px; color: var(--muted); }
  .num-btn.zero { grid-column: 2; }

  .auth-error {
    margin-top: 16px; font-size: 13px; color: var(--danger);
    min-height: 20px; transition: opacity 0.3s;
  }
</style>
</head>
<body>
<!-- ── 認証画面 ── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <h2>アクセス認証</h2>
    <p>アクセスコードを入力してください</p>
    <div class="pin-display" id="pin-display"></div>
    <div class="numpad">
      <button class="num-btn" onclick="pressNum('1')">1</button>
      <button class="num-btn" onclick="pressNum('2')">2</button>
      <button class="num-btn" onclick="pressNum('3')">3</button>
      <button class="num-btn" onclick="pressNum('4')">4</button>
      <button class="num-btn" onclick="pressNum('5')">5</button>
      <button class="num-btn" onclick="pressNum('6')">6</button>
      <button class="num-btn" onclick="pressNum('7')">7</button>
      <button class="num-btn" onclick="pressNum('8')">8</button>
      <button class="num-btn" onclick="pressNum('9')">9</button>
      <button class="num-btn del" onclick="pressNum('del')">⌫</button>
      <button class="num-btn zero" onclick="pressNum('0')">0</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14l-4-4 1.41-1.41L11 13.17l6.59-6.59L19 8l-8 8z"/></svg>
    </div>
    <h1>出退室システム</h1>
    <p>ATTENDANCE MANAGEMENT</p>
  </div>

  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <div class="card active" id="step1">
    <div class="card-label">STEP 01</div>
    <h2>学年を選択してください</h2>
    <div id="grade-container">
      <div class="loading">名簿を読み込み中<div class="spinner"></div></div>
    </div>
  </div>

  <div class="card" id="step2">
    <div class="card-label">STEP 02</div>
    <h2 id="step2-title">名前を選択してください</h2>
    <div class="current-status-info" id="current-status-info"></div>
    <div class="student-list" id="student-list"></div>
    <div class="action-row">
      <button class="btn btn-enter" id="btn-enter" onclick="submitAttendance('in')" disabled>入室</button>
      <button class="btn btn-exit"  id="btn-exit"  onclick="submitAttendance('out')" disabled>退室</button>
    </div>
    <button class="btn-back" onclick="goBack(1)">← 学年選択に戻る</button>
  </div>

  <div class="card" id="step3">
    <div class="success-screen" id="success-content"></div>
  </div>
</div>

<script>
// ── データ ──────────────────────────────────
let students = {};
let accessCode = '';      // CSVから読み取ったアクセスコード
let pinInput = '';
let selectedGrade = null;
let selectedStudent = null;

// ── 認証 ────────────────────────────────────
function renderPinDots() {
  const len = accessCode.length || 4;
  document.getElementById('pin-display').innerHTML =
    Array.from({length: len}, (_,i) =>
      `<div class="pin-dot ${i < pinInput.length ? 'filled' : ''}"></div>`
    ).join('');
}

async function pressNum(val) {
  if (val === 'del') {
    pinInput = pinInput.slice(0, -1);
    document.getElementById('auth-error').textContent = '';
    renderPinDots();
    return;
  }
  if (!accessCode) return;
  if (pinInput.length >= accessCode.length) return;
  pinInput += val;
  renderPinDots();

  if (pinInput.length === accessCode.length) {
    // 入力完了時にCSVを再取得 → 最新コードで照合
    await fetchAccessCode();

    if (pinInput === accessCode) {
      document.getElementById('auth-screen').style.display = 'none';
    } else {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
      document.getElementById('auth-error').textContent = 'コードが違います。もう一度入力してください。';
      setTimeout(() => { pinInput = ''; renderPinDots(); }, 800);
    }
  }
}

// CSV からアクセスコードだけを取得（キャッシュ回避）
async function fetchAccessCode() {
  try {
    const res = await fetch('meibo.csv?_=' + Date.now());
    if (!res.ok) return;
    const text = await res.text();
    for (const line of text.split(/\r?\n/)) {
      const parts = line.split(',').map(s => s.trim());
      if (parts[0] === 'アクセスコード' && parts[1]) {
        accessCode = parts[1];
        renderPinDots();
        break;
      }
    }
  } catch { /* ネットワークエラー時は既存コードで継続 */ }
}

// ── CSV 読み込み ─────────────────────────────
async function loadCSV() {
  const container = document.getElementById('grade-container');
  try {
    const res = await fetch('meibo.csv?_=' + Date.now());
    if (!res.ok) throw new Error(`ファイルが見つかりません (HTTP ${res.status})`);
    const text = await res.text();
    parseCSV(text);
    buildGradeButtons();
  } catch (e) {
    container.innerHTML = `
      <div class="error-msg">
        ⚠️ 名簿の読み込みに失敗しました。<br>
        <code>meibo.csv</code> を同じフォルダに置いてください。<br><br>
        <small style="opacity:.6">${e.message}</small>
      </div>`;
  }
}

function parseCSV(text) {
  students = {};
  accessCode = '';
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const start = lines[0].startsWith('学年') ? 1 : 0;
  lines.slice(start).forEach(line => {
    const parts = line.split(',').map(s => s.trim());
    if (parts[0] === 'アクセスコード') {
      accessCode = parts[1] || '';
      return;
    }
    const [grade, name] = parts;
    if (!grade || !name) return;
    if (!students[grade]) students[grade] = [];
    students[grade].push(name);
  });
  // ドット表示を初期化
  renderPinDots();
}

function buildGradeButtons() {
  const grades = Object.keys(students);
  if (!grades.length) {
    document.getElementById('grade-container').innerHTML =
      '<div class="error-msg">⚠️ 名簿にデータがありません。</div>';
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'grade-grid';
  grades.forEach(grade => {
    const btn = document.createElement('button');
    btn.className = 'grade-btn';
    btn.dataset.grade = grade;
    const m = grade.match(/^(\d+)(.*)/);
    const num = m ? m[1] : grade;
    const lbl = m ? m[2] + '生' : '';
    btn.innerHTML = `<span class="grade-num">${num}</span><span class="grade-label">${lbl}</span>`;
    btn.addEventListener('click', () => selectGrade(grade, btn));
    grid.appendChild(btn);
  });
  document.getElementById('grade-container').innerHTML = '';
  document.getElementById('grade-container').appendChild(grid);
}

// ── 出退室ロジック ───────────────────────────
function getStatus() {
  try { return JSON.parse(localStorage.getItem('attendance') || '{}'); } catch { return {}; }
}
function setStatus(data) {
  localStorage.setItem('attendance', JSON.stringify(data));
  localStorage.setItem('attendance_updated', Date.now().toString());
}

function selectGrade(grade, btn) {
  selectedGrade = grade;
  selectedStudent = null;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  const list = document.getElementById('student-list');
  const status = getStatus();
  list.innerHTML = '';
  (students[grade] || []).forEach(name => {
    const isIn = status[name] === 'in';
    const item = document.createElement('div');
    item.className = 'student-item';
    item.dataset.name = name;
    item.innerHTML = `
      <div class="radio-circle"></div>
      <span class="student-name">${name}</span>
      <span class="status-badge ${isIn ? 'in' : 'out'}">${isIn ? '入室中' : '退室中'}</span>
    `;
    item.addEventListener('click', () => selectStudent(name));
    list.appendChild(item);
  });

  document.getElementById('step2-title').textContent = `${grade} — 名前を選択`;
  document.getElementById('btn-enter').disabled = true;
  document.getElementById('btn-exit').disabled = true;
  document.getElementById('current-status-info').className = 'current-status-info';
  goToStep(2);
}

function selectStudent(name) {
  selectedStudent = name;
  document.querySelectorAll('.student-item').forEach(i => i.classList.toggle('selected', i.dataset.name === name));
  const isIn = getStatus()[name] === 'in';
  const info = document.getElementById('current-status-info');
  info.className = 'current-status-info show';
  info.innerHTML = `<strong>${name}</strong> の現在の状態：${isIn ? '🟢 入室中' : '⚪ 退室中'}`;
  document.getElementById('btn-enter').disabled = false;
  document.getElementById('btn-exit').disabled = false;
}

function submitAttendance(type) {
  if (!selectedStudent) return;
  const status = getStatus();
  status[selectedStudent] = type;
  setStatus(status);

  const now = new Date();
  const isEnter = type === 'in';
  document.getElementById('success-content').innerHTML = `
    <div class="success-icon ${isEnter ? 'enter' : 'exit'}">${isEnter ? '✓' : '→'}</div>
    <h2>${isEnter ? '入室しました' : '退室しました'}</h2>
    <p>${selectedStudent} さん、${isEnter ? 'おはようございます！' : 'お疲れさまでした！'}</p>
    <div class="time-display">
      ${now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}<br>
      ${now.toLocaleTimeString('ja-JP')}
    </div>
    <button class="btn-reset" onclick="resetAll()">続けて登録する</button>
  `;
  goToStep(3);
}

function goToStep(n) {
  document.querySelectorAll('.card').forEach((c,i) => c.classList.toggle('active', i+1===n));
  document.querySelectorAll('.step-dot').forEach((d,i) => {
    d.classList.remove('active','done');
    if (i+1 < n) d.classList.add('done');
    else if (i+1 === n) d.classList.add('active');
  });
}

function goBack(n) { selectedStudent = null; goToStep(n); }

function resetAll() {
  selectedGrade = selectedStudent = null;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  loadCSV();   // ← CSV を再読み込みして最新名簿を反映
  goToStep(1);
}

loadCSV();
</script>
</body>
</html>
