<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<title>出退室モニター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --in: #10b981;
    --out: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --border: rgba(0, 212, 255, 0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 32px;
    background-image: 
      radial-gradient(ellipse at 10% 50%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 10%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .title-block {}

  .title-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.3em;
    margin-bottom: 8px;
  }

  .main-title {
    font-size: 36px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .main-title span { color: var(--accent); }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .date-str {
    font-size: 14px;
    color: var(--text2);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--in);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--in);
    animation: pulse 1.5s infinite;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat-icon { font-size: 28px; }

  .stat-value {
    font-size: 40px;
    font-weight: 900;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1;
  }
  .in-val { color: var(--in); }
  .out-val { color: var(--out); }

  .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .grade-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .grade-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .grade-head {
    padding: 14px 20px;
    background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(0, 212, 255, 0.1));
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .grade-head-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .in-chip {
    font-size: 13px;
    font-weight: 700;
    color: var(--in);
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 20px;
    padding: 4px 14px;
  }

  .student-row {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .student-row:last-child { border-bottom: none; }
  .student-row.is-in { background: rgba(16, 185, 129, 0.03); }
  .student-row.is-out { background: rgba(245, 158, 11, 0.02); }

  .s-name { font-size: 16px; font-weight: 600; }

  .s-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }
  .badge-in {
    background: rgba(16, 185, 129, 0.15);
    color: var(--in);
    border: 1px solid rgba(16, 185, 129, 0.35);
  }
  .badge-out {
    background: rgba(245, 158, 11, 0.1);
    color: var(--out);
    border: 1px solid rgba(245, 158, 11, 0.25);
  }

  .s-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }

  .s-phone {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--out);
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.25);
    border-radius: 6px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }

  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--text2);
    font-family: 'Share Tech Mono', monospace;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    body { padding: 16px; }
    .stats-row { grid-template-columns: 1fr; }
    .main-title { font-size: 26px; }
    .clock { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- 管理者ロック画面 -->
<div id="adminLock" style="
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background: var(--bg);
">
  <div style="
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:48px 40px; width:100%; max-width:400px; text-align:center;
    box-shadow:0 0 40px rgba(0,212,255,0.15), 0 25px 50px rgba(0,0,0,0.5);
    animation: fadeIn 0.5s ease;
  ">
    <div style="font-size:48px; margin-bottom:16px; filter:drop-shadow(0 0 10px var(--accent))">🛡️</div>
    <div style="font-size:22px; font-weight:700; color:var(--accent); margin-bottom:8px; letter-spacing:0.05em;">管理者モニター</div>
    <div style="font-size:13px; color:var(--text2); margin-bottom:32px;">管理者コードを入力してください</div>
    <div style="display:flex; gap:12px; justify-content:center; margin-bottom:24px;">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" autofocus style="
        width:56px; height:68px; background:var(--surface2); border:2px solid var(--border);
        border-radius:12px; font-size:28px; font-family:'Share Tech Mono',monospace; font-weight:700;
        color:var(--accent); text-align:center; outline:none; transition:all 0.2s;
      ">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" style="
        width:56px; height:68px; background:var(--surface2); border:2px solid var(--border);
        border-radius:12px; font-size:28px; font-family:'Share Tech Mono',monospace; font-weight:700;
        color:var(--accent); text-align:center; outline:none; transition:all 0.2s;
      ">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" style="
        width:56px; height:68px; background:var(--surface2); border:2px solid var(--border);
        border-radius:12px; font-size:28px; font-family:'Share Tech Mono',monospace; font-weight:700;
        color:var(--accent); text-align:center; outline:none; transition:all 0.2s;
      ">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" style="
        width:56px; height:68px; background:var(--surface2); border:2px solid var(--border);
        border-radius:12px; font-size:28px; font-family:'Share Tech Mono',monospace; font-weight:700;
        color:var(--accent); text-align:center; outline:none; transition:all 0.2s;
      ">
    </div>
    <button onclick="checkAdminCode()" style="
      width:100%; padding:14px; background:linear-gradient(135deg,#7c3aed,var(--accent));
      border:none; border-radius:12px; color:white; font-size:16px; font-weight:700;
      font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.3s; letter-spacing:0.05em;
    ">モニターを開く →</button>
    <div id="adminError" style="color:#ef4444; font-size:13px; margin-top:12px; display:none;">
      ❌ 管理者コードが正しくありません
    </div>
  </div>
</div>

<!-- モニター本体（認証後に表示） -->
<div id="monitorContent" style="display:none; padding:32px;">

<div class="header">
  <div class="title-block">
    <div class="title-label">ATTENDANCE MONITOR</div>
    <div class="main-title">出退室 <span>STATUS</span></div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-str" id="dateStr">----</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-icon">✅</div>
    <div>
      <div class="stat-value in-val" id="totalIn">0</div>
      <div class="stat-label">入室中</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🚶</div>
    <div>
      <div class="stat-value out-val" id="totalOut">0</div>
      <div class="stat-label">退室</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">👥</div>
    <div>
      <div class="stat-value" id="totalAll">0</div>
      <div class="stat-label">合計</div>
    </div>
  </div>
</div>

<div class="grade-grid" id="gradeGrid"></div>

<div class="footer" id="footer">最終更新: -- | 5秒ごとに自動更新</div>

</div><!-- /monitorContent -->

<script>
let roster = {};
let status = {};

// ===== ★ 設定エリア（index.htmlと同じ名簿を記入） =====
const MEIBO_CSV = `学年,名前
1年,佐藤琢磨
1年,菊池裕也
2年,斎藤実子
2年,富山愛
2年,遠藤悟
2年,瀬川流`;

// ★ 管理者専用アクセスコード（一般のアクセスコードとは別に設定）
const ADMIN_CODE = '9999';
// ============================================================

let isUnlocked = false;

function loadData() {
  parseCsv(MEIBO_CSV);

  try {
    const saved = localStorage.getItem('attendance_status');
    if (saved) status = JSON.parse(saved);
  } catch(e) {}

  Object.keys(roster).forEach(grade => {
    roster[grade].forEach(name => {
      const key = `${grade}_${name}`;
      if (!status[key]) status[key] = { in: true, time: '--:--' };
    });
  });

  renderAll();
}

function checkAdminCode() {
  const digits = document.querySelectorAll('.admin-digit');
  const entered = Array.from(digits).map(d => d.value).join('');
  if (entered === ADMIN_CODE) {
    isUnlocked = true;
    document.getElementById('adminLock').style.display = 'none';
    document.getElementById('monitorContent').style.display = 'block';
    loadData();
    setInterval(() => {
      try {
        const saved = localStorage.getItem('attendance_status');
        if (saved) { status = JSON.parse(saved); renderAll(); }
      } catch(e) {}
    }, 5000);
  } else {
    digits.forEach(d => {
      d.value = '';
      d.style.borderColor = '#ef4444';
    });
    document.getElementById('adminError').style.display = 'block';
    setTimeout(() => {
      digits.forEach(d => d.style.borderColor = '');
      document.getElementById('adminError').style.display = 'none';
      digits[0].focus();
    }, 1500);
  }
}

function setupAdminInputs() {
  const digits = document.querySelectorAll('.admin-digit');
  digits.forEach((input, i) => {
    input.addEventListener('input', (e) => {
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val ? val[val.length-1] : '';
      if (val && i < digits.length - 1) digits[i+1].focus();
      if (val && i === digits.length - 1) checkAdminCode();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && i > 0) {
        digits[i-1].focus();
        digits[i-1].value = '';
      }
    });
  });
}

function parseCsv(text) {
  const lines = text.trim().split('\n');
  roster = {};
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(',');
    const grade = cols[0]?.trim();
    const name = cols[1]?.trim();
    if (!grade || !name) continue;
    if (!roster[grade]) roster[grade] = [];
    roster[grade].push(name);
  }
}

function renderAll() {
  const grades = Object.keys(roster).sort();
  let totalIn = 0, totalOut = 0, total = 0;

  const html = grades.map(grade => {
    const students = roster[grade] || [];
    const inCount = students.filter(n => status[`${grade}_${n}`]?.in !== false).length;
    totalIn += inCount;
    totalOut += students.length - inCount;
    total += students.length;

    const rows = students.map(name => {
      const key = `${grade}_${name}`;
      const st = status[key] || { in: true, time: '--:--' };
      const isIn = st.in !== false;
      const phone = st.phone || '';
      return `
        <div class="student-row ${isIn ? 'is-in' : 'is-out'}">
          <div class="s-name">${name}</div>
          <div class="s-right">
            <span class="status-badge ${isIn ? 'badge-in' : 'badge-out'}">
              ${isIn ? '✅ 入室中' : '🚶 退室'}
            </span>
            ${st.time !== '--:--' ? `<span class="s-time">${st.time}</span>` : ''}
            ${!isIn && phone ? `<span class="s-phone">📞 ${phone}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="grade-section">
        <div class="grade-head">
          <div class="grade-head-name">📚 ${grade}</div>
          <div class="in-chip">入室 ${inCount}/${students.length}</div>
        </div>
        ${rows}
      </div>
    `;
  }).join('');

  document.getElementById('gradeGrid').innerHTML = html;
  document.getElementById('totalIn').textContent = totalIn;
  document.getElementById('totalOut').textContent = totalOut;
  document.getElementById('totalAll').textContent = total;
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
  document.getElementById('dateStr').textContent = now.toLocaleDateString('ja-JP', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
  });
  document.getElementById('footer').textContent = 
    `最終更新: ${now.toLocaleTimeString('ja-JP')} | 30秒ごとに自動リロード`;
}

setInterval(updateClock, 1000);
updateClock();
setupAdminInputs();
</script>
</body>
</html>
