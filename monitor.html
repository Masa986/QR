<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>出退室モニター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --in: #10b981;
    --out: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --border: rgba(0, 212, 255, 0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 32px;
    background-image: 
      radial-gradient(ellipse at 10% 50%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 10%, rgba(0, 212, 255, 0.05) 0%, transparent 50%);
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .title-block {}

  .title-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.3em;
    margin-bottom: 8px;
  }

  .main-title {
    font-size: 36px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .main-title span { color: var(--accent); }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .date-str {
    font-size: 14px;
    color: var(--text2);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--in);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--in);
    animation: pulse 1.5s infinite;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat-icon { font-size: 28px; }

  .stat-value {
    font-size: 40px;
    font-weight: 900;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1;
  }
  .in-val { color: var(--in); }
  .out-val { color: var(--out); }

  .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .grade-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .grade-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .grade-head {
    padding: 14px 20px;
    background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(0, 212, 255, 0.1));
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .grade-head-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  .in-chip {
    font-size: 13px;
    font-weight: 700;
    color: var(--in);
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 20px;
    padding: 4px 14px;
  }

  .student-row {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .student-row:last-child { border-bottom: none; }
  .student-row.is-in { background: rgba(16, 185, 129, 0.03); }
  .student-row.is-out { background: rgba(245, 158, 11, 0.02); }

  .s-name { font-size: 16px; font-weight: 600; }

  .s-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }
  .badge-in {
    background: rgba(16, 185, 129, 0.15);
    color: var(--in);
    border: 1px solid rgba(16, 185, 129, 0.35);
  }
  .badge-out {
    background: rgba(245, 158, 11, 0.1);
    color: var(--out);
    border: 1px solid rgba(245, 158, 11, 0.25);
  }

  .s-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }

  .s-phone {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--out);
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.25);
    border-radius: 6px;
    padding: 2px 8px;
    letter-spacing: 0.05em;
  }

  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--text2);
    font-family: 'Share Tech Mono', monospace;
  }

  /* ===== LOG PANEL ===== */
  .log-panel {
    margin-top: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .log-panel-header {
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(0,212,255,0.1));
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .log-panel-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  .log-filter-wrap {
    display: flex;
    gap: 8px;
  }

  .log-filter-wrap select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
  }

  .log-dl-btn {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .log-dl-btn:hover { background: rgba(0,212,255,0.2); }

  .log-clear-btn {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px;
    color: #f87171;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .log-clear-btn:hover { background: rgba(239,68,68,0.18); }

  /* ===== RESET BUTTON ===== */
  .reset-btn {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    color: #f87171;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .reset-btn:hover {
    background: rgba(239,68,68,0.22);
    border-color: rgba(239,68,68,0.6);
    color: #fca5a5;
  }

  .reset-check-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .reset-check-label:last-child { border-bottom: none; }
  .reset-check-label input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: #ef4444;
    cursor: pointer;
    flex-shrink: 0;
  }

  #logTableWrap {
    overflow-x: auto;
  }

  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .log-table thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: rgba(255,255,255,0.02);
  }

  .log-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .log-table tbody tr:last-child { border-bottom: none; }
  .log-table tbody tr:hover { background: rgba(255,255,255,0.03); }

  .log-table tbody td {
    padding: 11px 16px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .log-table .td-time {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text2);
    font-size: 12px;
  }

  .log-table .td-date {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text2);
    font-size: 12px;
  }

  .log-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }
  .log-badge-in {
    background: rgba(16,185,129,0.15);
    color: var(--in);
    border: 1px solid rgba(16,185,129,0.3);
  }
  .log-badge-out {
    background: rgba(245,158,11,0.1);
    color: var(--out);
    border: 1px solid rgba(245,158,11,0.25);
  }

  .log-phone {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--out);
  }

  .log-empty {
    padding: 32px;
    text-align: center;
    color: var(--text2);
    font-size: 14px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    body { padding: 16px; }
    .stats-row { grid-template-columns: 1fr; }
    .main-title { font-size: 26px; }
    .clock { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- 管理者ロック画面 -->
<div id="adminLock" style="
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  background: var(--bg);
">
  <div style="
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:48px 40px; width:100%; max-width:400px; text-align:center;
    box-shadow:0 0 40px rgba(0,212,255,0.15), 0 25px 50px rgba(0,0,0,0.5);
    animation: fadeIn 0.5s ease;
  ">
    <div id="adminLockIcon" style="font-size:48px; margin-bottom:16px; filter:drop-shadow(0 0 10px var(--accent))">🛡️</div>
    <div style="font-size:22px; font-weight:700; color:var(--accent); margin-bottom:8px; letter-spacing:0.05em;">管理者モニター</div>
    <div style="font-size:13px; color:var(--text2); margin-bottom:32px;">管理者コードを入力してください</div>
    <div id="adminInputWrap" style="display:flex; gap:12px; justify-content:center; margin-bottom:24px;">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" autofocus style="width:56px;height:68px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;font-size:28px;font-family:'Share Tech Mono',monospace;font-weight:700;color:var(--accent);text-align:center;outline:none;transition:all 0.2s;">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" style="width:56px;height:68px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;font-size:28px;font-family:'Share Tech Mono',monospace;font-weight:700;color:var(--accent);text-align:center;outline:none;transition:all 0.2s;">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" style="width:56px;height:68px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;font-size:28px;font-family:'Share Tech Mono',monospace;font-weight:700;color:var(--accent);text-align:center;outline:none;transition:all 0.2s;">
      <input class="admin-digit" type="text" inputmode="numeric" maxlength="1" style="width:56px;height:68px;background:var(--surface2);border:2px solid var(--border);border-radius:12px;font-size:28px;font-family:'Share Tech Mono',monospace;font-weight:700;color:var(--accent);text-align:center;outline:none;transition:all 0.2s;">
    </div>
    <button id="adminSubmitBtn" onclick="checkAdminCode()" style="
      width:100%; padding:14px; background:linear-gradient(135deg,#7c3aed,var(--accent));
      border:none; border-radius:12px; color:white; font-size:16px; font-weight:700;
      font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.3s; letter-spacing:0.05em;
    ">モニターを開く →</button>
    <div id="adminError" style="color:#ef4444; font-size:13px; margin-top:12px; display:none;"></div>
    <!-- 試行回数インジケーター -->
    <div id="adminAttemptIndicator" style="display:flex;justify-content:center;gap:6px;margin-top:14px;">
      <div class="adot" id="adot0" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.3s;"></div>
      <div class="adot" id="adot1" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.3s;"></div>
      <div class="adot" id="adot2" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.3s;"></div>
      <div class="adot" id="adot3" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.3s;"></div>
      <div class="adot" id="adot4" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.3s;"></div>
    </div>
    <!-- ロックアウト表示 -->
    <div id="adminLockoutMsg" style="display:none;margin-top:16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.4);border-radius:12px;padding:14px 16px;">
      <div style="color:#ef4444;font-size:14px;font-weight:700;margin-bottom:6px;">🔒 アクセスがロックされました</div>
      <div id="adminLockoutTimer" style="color:#f87171;font-size:28px;font-weight:900;font-family:'Share Tech Mono',monospace;letter-spacing:0.1em;">0:00</div>
      <div style="color:#94a3b8;font-size:11px;margin-top:4px;">時間経過後に再試行できます</div>
    </div>
  </div>
</div>

<!-- モニター本体（認証後に表示） -->
<div id="monitorContent" style="display:none; padding:32px;">

<div class="header">
  <div class="title-block">
    <div class="title-label">ATTENDANCE MONITOR</div>
    <div class="main-title">出退室 <span>STATUS</span></div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-str" id="dateStr">----</div>
    <button class="reset-btn" onclick="showResetModal()">🔄 リセット</button>
  </div>
</div>

<!-- リセット確認モーダル -->
<div id="resetModal" style="
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
  z-index:1000; align-items:center; justify-content:center; padding:24px;
">
  <div style="
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:36px 32px; width:100%; max-width:420px; text-align:center;
    box-shadow:0 0 40px rgba(239,68,68,0.2), 0 25px 50px rgba(0,0,0,0.6);
    animation: fadeIn 0.2s ease;
  ">
    <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
    <div style="font-size:20px; font-weight:700; color:#ef4444; margin-bottom:10px; letter-spacing:0.03em;">データをリセット</div>
    <div style="font-size:13px; color:var(--text2); margin-bottom:28px; line-height:1.8;">
      以下のデータをすべて初期状態に戻します。<br>
      <strong style="color:var(--text);">この操作は元に戻せません。</strong>
    </div>
    <!-- リセット対象チェックボックス -->
    <div style="text-align:left; background:rgba(255,255,255,0.04); border-radius:12px; padding:16px 20px; margin-bottom:24px;">
      <label class="reset-check-label">
        <input type="checkbox" id="chk_status" checked>
        <span>✅ 出退室ステータス（全員を入室中に戻す）</span>
      </label>
      <label class="reset-check-label">
        <input type="checkbox" id="chk_log" checked>
        <span>📋 操作ログ（全件削除）</span>
      </label>
      <label class="reset-check-label">
        <input type="checkbox" id="chk_lock">
        <span>🔒 ブルートフォースロック（解除）</span>
      </label>
    </div>
    <div style="display:flex; gap:12px;">
      <button onclick="hideResetModal()" style="
        flex:1; padding:13px; background:var(--surface2); border:1px solid var(--border);
        border-radius:12px; color:var(--text2); font-family:'Noto Sans JP',sans-serif;
        font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s;
      ">キャンセル</button>
      <button onclick="executeReset()" style="
        flex:1; padding:13px; background:linear-gradient(135deg,#dc2626,#ef4444);
        border:none; border-radius:12px; color:white; font-family:'Noto Sans JP',sans-serif;
        font-size:15px; font-weight:700; cursor:pointer; transition:all 0.2s;
        box-shadow:0 4px 14px rgba(239,68,68,0.35);
      ">リセット実行</button>
    </div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-icon">✅</div>
    <div>
      <div class="stat-value in-val" id="totalIn">0</div>
      <div class="stat-label">入室中</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🚶</div>
    <div>
      <div class="stat-value out-val" id="totalOut">0</div>
      <div class="stat-label">退室</div>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">👥</div>
    <div>
      <div class="stat-value" id="totalAll">0</div>
      <div class="stat-label">合計</div>
    </div>
  </div>
  <div class="stat-card" id="sessionStatCard">
    <div class="stat-icon" id="sessionStatIcon">🟢</div>
    <div>
      <div class="stat-value" id="sessionStatValue" style="font-size:13px;">待機中</div>
      <div class="stat-label">端末セッション</div>
    </div>
  </div>
</div>

<div class="grade-grid" id="gradeGrid"></div>

<!-- ログパネル -->
<div class="log-panel">
  <div class="log-panel-header">
    <div class="log-panel-title">📋 操作ログ</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <div class="log-filter-wrap">
        <select id="logFilterGrade" onchange="renderLog()">
          <option value="">全学年</option>
        </select>
        <select id="logFilterAction" onchange="renderLog()">
          <option value="">全操作</option>
          <option value="入室">入室のみ</option>
          <option value="退室">退室のみ</option>
        </select>
      </div>
      <button class="log-dl-btn" onclick="downloadLogCSV()">⬇ CSV保存</button>
      <button class="log-clear-btn" onclick="clearLog()">🗑 ログ削除</button>
    </div>
  </div>
  <div id="logTableWrap">
    <table class="log-table">
      <thead>
        <tr>
          <th>日付</th>
          <th>時刻</th>
          <th>学年</th>
          <th>氏名</th>
          <th>操作</th>
          <th>電話番号</th>
        </tr>
      </thead>
      <tbody id="logTableBody"></tbody>
    </table>
    <div id="logEmpty" class="log-empty" style="display:none;">操作履歴がありません</div>
  </div>
</div>

<div class="footer" id="footer">最終更新: -- | 5秒ごとに自動更新</div>

</div><!-- /monitorContent -->

<script>
let roster = {};
let status = {};

// ===== ★ 設定エリア ==========================================
// AC_MG.txt の内容をそのままここに貼り付けてください（管理者用コード）
const AC_MG = `2019`;

// 名簿 CSV の内容をそのままここに貼り付けてください
const MEIBO_CSV = `学年,名前
1年,佐藤琢磨
1年,菊池裕也
2年,斎藤実子
2年,富山愛
2年,遠藤悟
2年,瀬川流`;

const ADMIN_CODE = AC_MG.trim();
// ============================================================

let isUnlocked = false;

function loadData() {
  parseCsv(MEIBO_CSV);

  try {
    const saved = localStorage.getItem('attendance_status');
    if (saved) status = JSON.parse(saved);
  } catch(e) {}

  Object.keys(roster).forEach(grade => {
    roster[grade].forEach(name => {
      const key = `${grade}_${name}`;
      if (!status[key]) status[key] = { in: true, time: '--:--' };
    });
  });

  renderAll();
  populateGradeFilter();
  renderLog();
  renderSessionStatus();
}

// ===== BRUTE FORCE PROTECTION (管理者用) =====
const BF_MG_KEY        = 'bf_manage';
const MG_MAX_ATTEMPTS  = 5;
const MG_LOCKOUT_DURATIONS = [0, 0, 0, 0, 0, 30, 60, 300, 300, 300];

function getMgBfState() {
  try {
    const s = localStorage.getItem(BF_MG_KEY);
    return s ? JSON.parse(s) : { attempts: 0, lockedUntil: 0 };
  } catch(e) { return { attempts: 0, lockedUntil: 0 }; }
}
function saveMgBfState(state) {
  try { localStorage.setItem(BF_MG_KEY, JSON.stringify(state)); } catch(e) {}
}

let mgLockoutInterval = null;

function updateAdminDots(attempts) {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById(`adot${i}`);
    if (!dot) continue;
    dot.style.background = i < attempts
      ? (i >= MG_MAX_ATTEMPTS - 2 ? '#f59e0b' : '#ef4444')
      : 'rgba(255,255,255,0.15)';
  }
}

function startAdminLockout(until) {
  const digits    = document.querySelectorAll('.admin-digit');
  const btn       = document.getElementById('adminSubmitBtn');
  const lockMsg   = document.getElementById('adminLockoutMsg');
  const timerEl   = document.getElementById('adminLockoutTimer');
  const inputWrap = document.getElementById('adminInputWrap');
  const lockIcon  = document.getElementById('adminLockIcon');

  lockMsg.style.display = 'block';
  inputWrap.style.opacity = '0.3';
  inputWrap.style.pointerEvents = 'none';
  btn.disabled = true;
  btn.style.opacity = '0.3';
  lockIcon.textContent = '🔒';
  digits.forEach(d => { d.value = ''; d.disabled = true; });

  if (mgLockoutInterval) clearInterval(mgLockoutInterval);
  mgLockoutInterval = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((until - Date.now()) / 1000));
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
    if (remaining <= 0) {
      clearInterval(mgLockoutInterval);
      lockMsg.style.display = 'none';
      inputWrap.style.opacity = '';
      inputWrap.style.pointerEvents = '';
      btn.disabled = false;
      btn.style.opacity = '';
      lockIcon.textContent = '🛡️';
      digits.forEach(d => { d.disabled = false; });
      digits[0].focus();
    }
  }, 500);
}

function checkAdminLockoutOnLoad() {
  const state = getMgBfState();
  updateAdminDots(state.attempts);
  if (state.lockedUntil > Date.now()) startAdminLockout(state.lockedUntil);
}

function checkAdminCode() {
  const state = getMgBfState();
  if (state.lockedUntil > Date.now()) return;

  const digits  = document.querySelectorAll('.admin-digit');
  const entered = Array.from(digits).map(d => d.value).join('');
  const errEl   = document.getElementById('adminError');

  if (entered === ADMIN_CODE) {
    localStorage.removeItem(BF_MG_KEY);
    isUnlocked = true;
    document.getElementById('adminLock').style.display = 'none';
    document.getElementById('monitorContent').style.display = 'block';
    loadData();
    setInterval(() => {
      try {
        const saved = localStorage.getItem('attendance_status');
        if (saved) { status = JSON.parse(saved); renderAll(); }
        renderLog();
        renderSessionStatus();
      } catch(e) {}
    }, 5000);
  } else {
    state.attempts += 1;
    if (state.attempts >= MG_MAX_ATTEMPTS) {
      const durIdx = Math.min(state.attempts, MG_LOCKOUT_DURATIONS.length - 1);
      state.lockedUntil = Date.now() + MG_LOCKOUT_DURATIONS[durIdx] * 1000;
      saveMgBfState(state);
      updateAdminDots(state.attempts);
      startAdminLockout(state.lockedUntil);
    } else {
      saveMgBfState(state);
      updateAdminDots(state.attempts);
      errEl.textContent = `❌ コードが違います（残り ${MG_MAX_ATTEMPTS - state.attempts} 回）`;
      errEl.style.display = 'block';
      digits.forEach(d => { d.value = ''; d.style.borderColor = '#ef4444'; });
      setTimeout(() => {
        digits.forEach(d => d.style.borderColor = '');
        errEl.style.display = 'none';
        digits[0].focus();
      }, 1500);
    }
  }
}

function setupAdminInputs() {
  const digits = document.querySelectorAll('.admin-digit');
  digits.forEach((input, i) => {
    input.addEventListener('input', (e) => {
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val ? val[val.length-1] : '';
      if (val && i < digits.length - 1) digits[i+1].focus();
      if (val && i === digits.length - 1) checkAdminCode();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && i > 0) {
        digits[i-1].focus();
        digits[i-1].value = '';
      }
    });
  });
}

function parseCsv(text) {
  const lines = text.trim().split('\n');
  roster = {};
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = line.split(',');
    const grade = cols[0]?.trim();
    const name = cols[1]?.trim();
    if (!grade || !name) continue;
    if (!roster[grade]) roster[grade] = [];
    roster[grade].push(name);
  }
}

function renderAll() {
  const grades = Object.keys(roster).sort();
  let totalIn = 0, totalOut = 0, total = 0;

  const html = grades.map(grade => {
    const students = roster[grade] || [];
    const inCount = students.filter(n => status[`${grade}_${n}`]?.in !== false).length;
    totalIn += inCount;
    totalOut += students.length - inCount;
    total += students.length;

    const rows = students.map(name => {
      const key = `${grade}_${name}`;
      const st = status[key] || { in: true, time: '--:--' };
      const isIn = st.in !== false;
      const phone = st.phone || '';
      return `
        <div class="student-row ${isIn ? 'is-in' : 'is-out'}">
          <div class="s-name">${name}</div>
          <div class="s-right">
            <span class="status-badge ${isIn ? 'badge-in' : 'badge-out'}">
              ${isIn ? '✅ 入室中' : '🚶 退室'}
            </span>
            ${st.time !== '--:--' ? `<span class="s-time">${st.time}</span>` : ''}
            ${!isIn && phone ? `<span class="s-phone">📞 ${phone}</span>` : ''}
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="grade-section">
        <div class="grade-head">
          <div class="grade-head-name">📚 ${grade}</div>
          <div class="in-chip">入室 ${inCount}/${students.length}</div>
        </div>
        ${rows}
      </div>
    `;
  }).join('');

  document.getElementById('gradeGrid').innerHTML = html;
  document.getElementById('totalIn').textContent = totalIn;
  document.getElementById('totalOut').textContent = totalOut;
  document.getElementById('totalAll').textContent = total;
}

// ===== RESET =====
function showResetModal() {
  const modal = document.getElementById('resetModal');
  modal.style.display = 'flex';
}

function hideResetModal() {
  document.getElementById('resetModal').style.display = 'none';
}

function executeReset() {
  const chkStatus = document.getElementById('chk_status').checked;
  const chkLog    = document.getElementById('chk_log').checked;
  const chkLock   = document.getElementById('chk_lock').checked;

  if (!chkStatus && !chkLog && !chkLock) {
    alert('リセット対象を1つ以上選択してください。');
    return;
  }

  // 出退室ステータスをリセット（全員入室中）
  if (chkStatus) {
    try {
      // 名簿から全生徒の初期ステータスを生成
      const initStatus = {};
      Object.entries(roster).forEach(([grade, names]) => {
        names.forEach(name => {
          initStatus[`${grade}_${name}`] = { in: true, time: '--:--', phone: '' };
        });
      });
      localStorage.setItem('attendance_status', JSON.stringify(initStatus));
      status = initStatus;
    } catch(e) {}
  }

  // 操作ログを削除
  if (chkLog) {
    localStorage.removeItem('attendance_log');
  }

  // ブルートフォースロックを解除
  if (chkLock) {
    localStorage.removeItem('bf_user');
    localStorage.removeItem('bf_manage');
  }

  hideResetModal();

  // 画面を再描画
  renderAll();
  renderLog();

  // 完了トースト表示
  showResetToast();
}

function showResetToast() {
  let toast = document.getElementById('resetToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'resetToast';
    toast.style.cssText = `
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
      background:linear-gradient(135deg,#065f46,#059669);
      color:white; padding:12px 24px; border-radius:50px;
      font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700;
      box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:2000;
      opacity:0; transition:opacity 0.3s; white-space:nowrap;
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = '✅ リセットが完了しました';
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP');
  document.getElementById('dateStr').textContent = now.toLocaleDateString('ja-JP', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
  });
  document.getElementById('footer').textContent = 
    `最終更新: ${now.toLocaleTimeString('ja-JP')} | 5秒ごとに自動更新`;
}

// ===== LOG =====
const LOG_KEY = 'attendance_log';

function getLog() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch(e) { return []; }
}

function renderLog() {
  const logs      = getLog();
  const filterGr  = document.getElementById('logFilterGrade')?.value || '';
  const filterAct = document.getElementById('logFilterAction')?.value || '';
  const tbody     = document.getElementById('logTableBody');
  const emptyEl   = document.getElementById('logEmpty');
  if (!tbody) return;

  const filtered = logs.filter(l =>
    (!filterGr  || l.grade  === filterGr)  &&
    (!filterAct || l.action === filterAct)
  );

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  tbody.innerHTML = filtered.map(l => `
    <tr>
      <td class="td-date">${l.date || ''}</td>
      <td class="td-time">${l.time}</td>
      <td>${l.grade}</td>
      <td style="font-weight:600">${l.name}</td>
      <td>
        <span class="log-badge ${l.action === '入室' ? 'log-badge-in' : 'log-badge-out'}">
          ${l.action === '入室' ? '✅' : '🚶'} ${l.action}
        </span>
      </td>
      <td class="log-phone">${l.phone ? '📞 ' + l.phone : '<span style="color:var(--text2);font-size:11px;">—</span>'}</td>
    </tr>
  `).join('');
}

function populateGradeFilter() {
  const sel    = document.getElementById('logFilterGrade');
  if (!sel) return;
  const grades = Object.keys(roster).sort();
  grades.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    sel.appendChild(opt);
  });
}

function downloadLogCSV() {
  const logs = getLog();
  if (logs.length === 0) { alert('ログがありません'); return; }
  const header = '日付,時刻,学年,氏名,操作,電話番号\n';
  const rows   = logs.map(l =>
    `${l.date || ''},${l.time},${l.grade},${l.name},${l.action},${l.phone || ''}`
  ).join('\n');
  const blob   = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  const now    = new Date();
  a.href       = url;
  a.download   = `attendance_log_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearLog() {
  if (!confirm('操作ログをすべて削除しますか？\nこの操作は元に戻せません。')) return;
  localStorage.removeItem(LOG_KEY);
  renderLog();
}

// ===== SESSION STATUS =====
const SESSION_KEY       = 'attendance_active_session';
const SESSION_TIMEOUT   = 5 * 60 * 1000;   // 5分
const SESSION_HEARTBEAT = 30 * 1000;        // index.htmlのハートビート間隔と合わせる
// タイムアウト判定はハートビート1回分の余裕を持たせる
const SESSION_TIMEOUT_WITH_BUFFER = SESSION_TIMEOUT + SESSION_HEARTBEAT;

function renderSessionStatus() {
  const iconEl  = document.getElementById('sessionStatIcon');
  const valEl   = document.getElementById('sessionStatValue');
  if (!iconEl || !valEl) return;
  try {
    const s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (!s) {
      iconEl.textContent = '🟢';
      valEl.textContent  = '待機中';
      valEl.style.color  = '';
    } else if (Date.now() - s.ts > SESSION_TIMEOUT_WITH_BUFFER) {
      iconEl.textContent = '🟡';
      valEl.textContent  = 'タイムアウト';
      valEl.style.color  = '#f59e0b';
    } else {
      const elapsed = Math.floor((Date.now() - s.ts) / 1000);
      iconEl.textContent = '🔴';
      valEl.textContent  = `使用中 (${elapsed}秒)`;
      valEl.style.color  = '#f87171';
    }
  } catch(e) {}
}

setInterval(updateClock, 1000);
updateClock();
setupAdminInputs();
checkAdminLockoutOnLoad(); // ページ読み込み時にロック状態を復元
</script>
</body>
</html>
